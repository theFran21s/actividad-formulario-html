<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Formulario de inscripción</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 20px;
        }

        h1{
            text-align: center;
            color: #2c3e50;
        }

        form{
            background-color: white;
            width: 70%;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        fieldset{
            border: 2px solid #3498db;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 8px;
        }

        legend{
            color: #3498db;
            font-weight: bold;
        }

        input, select, textarea{
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #aaa;
        }

        input[type="radio"],
        input[type="checkbox"]{
            width: auto;
        }

        button{
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button[type="submit"]{
            background-color: #3498db;
            color: white;
        }

        button[type="reset"]{
            background-color: #e74c3c;
            color: white;
        }

        button:hover{
            opacity: 0.8;
        }

    </style>
</head>

<body>

    <h1>Formulario de inscripción al taller web</h1>

    <form action="#" method="post">

        <fieldset>
            <legend>Datos personales</legend>

            <label for="nombre">Nombres y apellidos:</label>
            <input type="text" id="nombre" name="nombre" required minlength="3" maxlength="80">

            <br><br>

            <label for="correo">Correo electrónico:</label>
            <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" required>

            <br><br>

            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" placeholder="0999999999" pattern="[0-9]{10}">

            <br><br>

            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad" min="15" max="80" required>

            <br><br>

            <label for="fecha">Fecha de nacimiento:</label>
            <input type="date" id="fecha" name="fecha">

        </fieldset>


        <fieldset>
            <legend>Datos académicos</legend>

            <label for="carrera">Carrera o curso:</label>
            <input type="text" id="carrera" name="carrera" required>

            <br><br>

            <label for="nivel">Nivel académico:</label>
            <select id="nivel" name="nivel" required>
                <option value="">Seleccione una opción</option>
                <option value="bachillerato">Bachillerato</option>
                <option value="tecnologico">Tecnológico</option>
                <option value="universitario">Universitario</option>
            </select>

            <br><br>

            <label for="institucion">Institución educativa:</label>
            <input type="text" id="institucion" name="institucion">

        </fieldset>


        <fieldset>
            <legend>Preferencias del taller</legend>

            <p>Modalidad:</p>

            <input type="radio" id="presencial" name="modalidad" value="presencial">
            <label for="presencial">Presencial</label>

            <input type="radio" id="virtual" name="modalidad" value="virtual">
            <label for="virtual">Virtual</label>

            <input type="radio" id="hibrida" name="modalidad" value="hibrida">
            <label for="hibrida">Híbrida</label>

            <br><br>

            <p>Temas de interés:</p>

            <input type="checkbox" id="html" name="temas" value="html">
            <label for="html">HTML</label>

            <input type="checkbox" id="css" name="temas" value="css">
            <label for="css">CSS</label>

            <input type="checkbox" id="js" name="temas" value="javascript">
            <label for="js">JavaScript</label>

            <br><br>

            <label for="color">Color favorito:</label>
            <input type="color" id="color" name="color">

            <br><br>

            <label for="motivacion">Nivel de motivación:</label>
            <input type="range" id="motivacion" name="motivacion" min="1" max="10">

        </fieldset>


        <fieldset>
            <legend>Disponibilidad</legend>

            <label for="fecha_inicio">Fecha preferida:</label>
            <input type="date" id="fecha_inicio" name="fecha_inicio">

            <br><br>

            <label for="hora">Hora disponible:</label>
            <input type="time" id="hora" name="hora">

            <br><br>

            <label for="jornada">Jornada preferida:</label>
            <select id="jornada" name="jornada">
                <option value="manana">Mañana</option>
                <option value="tarde">Tarde</option>
                <option value="noche">Noche</option>
            </select>

        </fieldset>


        <fieldset>
            <legend>Información adicional</legend>

            <label for="archivo">Subir archivo:</label>
            <input type="file" id="archivo" name="archivo">

            <br><br>

            <label for="portafolio">Portafolio o perfil:</label>
            <input type="url" id="portafolio" name="portafolio" placeholder="https://ejemplo.com">

            <br><br>

            <label for="comentarios">Comentarios adicionales:</label>
            <textarea id="comentarios" name="comentarios" rows="5"></textarea>

        </fieldset>

        <button type="submit">Enviar inscripción</button>
        <button type="reset">Limpiar formulario</button>

    </form>

</body>
</html>
